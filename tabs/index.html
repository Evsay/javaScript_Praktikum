<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Praktika - Nikita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <header class="header-section">
            <div class="title-row">
                <h1>Meine</h1>
                <h1 class="highlight">Praktika</h1>
            </div>
            <p class="author">von Nikita</p>
        </header>

        <section class="praktikum-card">    
            <a class="card-link" href="bertin.html">
                <div class="logo-bar">
                    <img src="images/bertinLogo.png" alt="Bertin Logo" class="logo">
                </div>

                <div class="content-flex">
                    <div class="text-column">
                        <h2>Bertin GmbH</h2>
                        <p>Dieses Unternehmen bietet spannende Einblicke in die Labortechnik und Forschung...</p>
                    </div>
                    <div class="image-column">
                        <img src="images/bertinP.png" alt="Bertin Labor">
                    </div>
                </div>
            </a>
        </section>

        <section class="praktikum-card">
            <a class="card-link" href="daimler.html">
                <div class="logo-bar">
                    <img src="images/daimlerLogo.png" alt="Daimler Truck AG Logo" class="logo">
                </div>

                <div class="content-flex">
                    <div class="text-column">
                        <h2>Daimler Truck AG</h2>
                        <p>Bei Daimler Truck konnte ich die Produktion und Logistik von Nutzfahrzeugen hautnah miterleben...</p>
                    </div>
                    <div class="image-column">
                        <img src="images/daimlerSitz.png" alt="Daimler Frankfurt">
                    </div>
                </div>
            </a>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
